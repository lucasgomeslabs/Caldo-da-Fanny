<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>harness</title></head>
<body>
<!-- DOM mínimo, porém fiel aos seletores que o script usa. O <script> abaixo é
     um SNAPSHOT do inline de ../frontend/index.html (CEP+ViaCEP, máscara,
     Entrega C honeypot, Entrega D frete por distância).
     Se editar o index.html, atualize este bloco para manter os testes fiéis. -->

<div class="menu" id="menu">
  <label class="item"><input type="radio" name="caldo" value="Caldo Verde" data-price="24.90" required><span class="info"></span></label>
  <label class="item"><input type="radio" name="caldo" value="Caldo de Mandioca" data-price="24.90"><span class="info"></span></label>
  <label class="item"><input type="radio" name="caldo" value="Caldo Cremoso de Frango" data-price="24.90"><span class="info"></span></label>
</div>
<div class="err" id="err-caldo">Escolha um caldo.</div>

<div class="qty"><button type="button" id="minus">-</button><span id="qtyVal">1</span><button type="button" id="plus">+</button></div>

<div class="total" id="resumo">
  <div class="rline"><span class="rlbl">Subtotal</span><span class="rval" id="sumSub">R$ 24,90</span></div>
  <div class="rline"><span class="rlbl">Frete <span class="rinfo" id="freteInfo"></span></span><span class="rval" id="sumFrete">A confirmar</span></div>
  <div class="rline total-line"><span class="rlbl">Total</span><span class="rval rbig" id="sumTotal">A confirmar</span></div>
</div>

<form id="form" class="card" novalidate>
  <!-- Honeypot anti-bot (Entrega C) — espelho do index.html -->
  <div aria-hidden="true" style="position:absolute;left:-9999px"><label>Não preencha<input type="text" name="website" tabindex="-1" autocomplete="off"></label></div>
  <div class="field"><label>Nome</label><input type="text" name="nome"><div class="err">Informe seu nome.</div></div>
  <div class="field"><label>Telefone</label><input type="tel" name="telefone"><div class="err">Informe um telefone válido.</div></div>

  <div class="field">
    <label>CEP</label>
    <input type="text" name="cep" inputmode="numeric" maxlength="9" placeholder="00000-000" required>
    <div class="err">Informe um CEP válido (8 dígitos).</div>
    <div class="cep-status muted" id="cepStatus"></div>
  </div>

  <div class="field"><label>Endereço (rua / avenida)</label><input type="text" name="endereco"><div class="err">Informe a rua/avenida.</div></div>
  <div class="field"><label>Número</label><input type="text" name="numero"><div class="err">Informe o número.</div></div>
  <div class="field"><label>Complemento / referência</label><input type="text" name="complemento"></div>
  <div class="field"><label>Bairro</label><input type="text" name="bairro_cep"></div>
  <div class="row2">
    <div class="field"><label>Cidade</label><input type="text" name="cidade"></div>
    <div class="field uf"><label>UF</label><input type="text" name="uf" maxlength="2"></div>
  </div>

  <div class="field">
    <div class="pill-group" id="pgto">
      <label class="pill"><input type="radio" name="pagamento" value="PIX" required>PIX</label>
      <label class="pill"><input type="radio" name="pagamento" value="Dinheiro">Dinheiro</label>
      <label class="pill"><input type="radio" name="pagamento" value="Cartão">Cartão</label>
    </div>
    <div class="err" id="err-pgto">Escolha a forma de pagamento.</div>
  </div>

  <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>

  <button type="submit" class="send" id="submitBtn"><span id="btnText">PEÇA PELO WHATSAPP</span></button>
</form>

<div class="card done" id="done" style="display:none">
  <div class="pid" id="donePid">#001</div>
  <a class="wa-btn" id="waLink" href="#" target="_blank" rel="noopener">Confirmar no WhatsApp</a>
  <button class="again" id="again">Fazer outro pedido</button>
</div>

<script>
/* ===================== CONFIGURAÇÃO ===================== */
const WHATSAPP = "5511937223540";
const SHEETS_URL = ""; // cole aqui a URL .../exec do Apps Script
/* ======================================================= */

const PRICE = 24.90;
let qty = 1;
const $ = s => document.querySelector(s);
const fmt = n => "R$ " + n.toFixed(2).replace(".", ",");

document.querySelectorAll('#menu .item').forEach(it=>{
  it.addEventListener('click',()=>{
    document.querySelectorAll('#menu .item').forEach(x=>x.classList.remove('sel'));
    it.classList.add('sel'); $('#err-caldo').style.display='none'; recalc();
  });
});
['#pgto'].forEach(g=>{
  document.querySelectorAll(g+' .pill').forEach(p=>{
    p.addEventListener('click',()=>{
      document.querySelectorAll(g+' .pill').forEach(x=>x.classList.remove('sel'));
      p.classList.add('sel');
    });
  });
});

/* ===================== FRETE por distância (Entrega D) ===================== */
/* calcFrete(km): tabela em DEGRAUS por distância rodoviária (km) até a base.
   Limites: km<=3 grátis; (3,4] R$4; (4,5] R$6; (5,6] R$8; km>6 "consultar".
   IDÊNTICA ao index.html e ao snapshot em tests/backend-tests.mjs. */
function calcFrete(km){
  if(typeof km!=='number'||!(km>=0)) return {valor:null,status:'indef'};
  if(km<=3) return {valor:0,status:'gratis'};
  if(km<=4) return {valor:4,status:'pago'};
  if(km<=5) return {valor:6,status:'pago'};
  if(km<=6) return {valor:8,status:'pago'};
  return {valor:null,status:'consultar'};
}
let freteState={status:'indef',km:null,valor:0};
function resumoAtual(){
  const sub=PRICE*qty; const k=freteState.km;
  let freteTxt, totalNum=null, info='';
  if(freteState.status==='gratis'){ freteTxt='Grátis'; totalNum=sub; if(k!=null) info='('+k+' km)'; }
  else if(freteState.status==='pago'){ freteTxt=fmt(freteState.valor); totalNum=sub+freteState.valor; if(k!=null) info='('+k+' km)'; }
  else if(freteState.status==='consultar'){ freteTxt='Consultar pelo WhatsApp'; info='(> 6 km)'; }
  else if(freteState.status==='buscando'){ freteTxt='Calculando…'; }
  else { freteTxt='A confirmar pelo WhatsApp'; }
  return { subTxt:fmt(sub), freteTxt, info,
    totalTxt: totalNum!=null?fmt(totalNum):'A confirmar',
    km: k!=null?String(k):'' };
}
function recalc(){
  const r=resumoAtual();
  $('#qtyVal').textContent=qty;
  $('#sumSub').textContent=r.subTxt;
  $('#sumFrete').textContent=r.freteTxt;
  $('#freteInfo').textContent=r.info;
  $('#sumTotal').textContent=r.totalTxt;
}
window.fetchDistanciaKm=function(cep,logradouro,bairro,localidade,uf){
  return new Promise((resolve,reject)=>{
    if(!SHEETS_URL){ reject(new Error('backend desligado')); return; }
    const cb='__cf_dist_'+Date.now();
    const s=document.createElement('script'); let done=false;
    const cleanup=()=>{ try{delete window[cb];}catch(_){ window[cb]=undefined; } if(s.parentNode) s.parentNode.removeChild(s); };
    const to=setTimeout(()=>{ if(!done){ done=true; cleanup(); reject(new Error('timeout')); } },8000);
    window[cb]=resp=>{ if(done) return; done=true; clearTimeout(to); cleanup();
      if(resp&&typeof resp.km==='number') resolve(resp.km); else reject(new Error('sem distancia')); };
    s.onerror=()=>{ if(!done){ done=true; clearTimeout(to); cleanup(); reject(new Error('falha script')); } };
    s.src=SHEETS_URL+'?cep='+encodeURIComponent(cep)
      +'&logradouro='+encodeURIComponent(logradouro||'')
      +'&bairro='+encodeURIComponent(bairro||'')
      +'&localidade='+encodeURIComponent(localidade||'')
      +'&uf='+encodeURIComponent(uf||'')
      +'&callback='+cb;
    document.body.appendChild(s);
  });
};
let lastCepFrete='';
async function lookupFrete(cep,logradouro,bairro,localidade,uf){
  if(cep===lastCepFrete) return;
  lastCepFrete=cep;
  freteState={status:'buscando',km:null,valor:0}; recalc();
  try{
    const km=await window.fetchDistanciaKm(cep,logradouro,bairro,localidade,uf);
    const f=calcFrete(km);
    freteState={status:f.status,km:(typeof km==='number'?km:null),valor:f.valor||0};
  }catch(err){
    console.warn('Distância/ORS indisponível:',err);
    freteState={status:'indef',km:null,valor:0};
  }
  recalc();
}
function resetFrete(){ lastCepFrete=''; freteState={status:'indef',km:null,valor:0}; }
/* ========================================================================== */
$('#plus').onclick=()=>{ if(qty<20){qty++;recalc();} };
$('#minus').onclick=()=>{ if(qty>1){qty--;recalc();} };
document.querySelectorAll('#form input,#form textarea').forEach(el=>{
  el.addEventListener('input',()=>el.closest('.field')?.classList.remove('invalid'));
});

/* ===================== Máscara de telefone ===================== */
const telEl=document.querySelector('[name="telefone"]');
function maskTelefone(v){
  v=v.replace(/\D/g,'').slice(0,11);              // só dígitos, máx 11
  if(v.length===0) return '';
  if(v.length<=2)  return '('+v;                                       // (11
  if(v.length<=6)  return '('+v.slice(0,2)+') '+v.slice(2);            // (11) 9372
  if(v.length<=10) return '('+v.slice(0,2)+') '+v.slice(2,6)+'-'+v.slice(6);  // (11) 3722-3540
  return '('+v.slice(0,2)+') '+v.slice(2,7)+'-'+v.slice(7);            // (11) 93722-3540
}
telEl.addEventListener('input',()=>{
  telEl.value=maskTelefone(telEl.value);          // sem innerHTML — só .value
  telEl.closest('.field')?.classList.remove('invalid');
});
/* ============================================================== */

/* ===================== CEP + ViaCEP (Bloco 1) ===================== */
const cepEl=document.querySelector('[name="cep"]');
const cepStatus=document.getElementById('cepStatus');
const autoFields={
  endereco:document.querySelector('[name="endereco"]'),
  bairro_cep:document.querySelector('[name="bairro_cep"]'),
  cidade:document.querySelector('[name="cidade"]'),
  uf:document.querySelector('[name="uf"]')
};
const autoLast={endereco:'',bairro_cep:'',cidade:'',uf:''};
let lastCepQueried='';
function setCepStatus(msg,cls){ cepStatus.textContent=msg||''; cepStatus.className='cep-status '+(cls||'muted'); }
function setAuto(key,val){
  if(!val) return;
  const el=autoFields[key]; if(!el) return;
  if(el.value.trim()===''||el.value===autoLast[key]){
    el.value=val; autoLast[key]=val;
    el.closest('.field')?.classList.remove('invalid');
  }
}
async function lookupCep(cep){
  if(cep===lastCepQueried) return;
  lastCepQueried=cep;
  setCepStatus('Buscando endereço…','muted');
  try{
    const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.erro){ setCepStatus('CEP não encontrado. Você pode preencher o endereço manualmente.','warn'); return; }
    setAuto('endereco',d.logradouro);
    setAuto('bairro_cep',d.bairro);
    setAuto('cidade',d.localidade);
    setAuto('uf',d.uf);
    setCepStatus('Endereço preenchido pelo CEP ✓ — confira e complete o número.','ok');
    // Frete só APÓS o ViaCEP responder, com o endereço recém-recebido (evita corrida).
    lookupFrete(cep,d.logradouro,d.bairro,d.localidade,d.uf);
  }catch(err){
    console.warn('ViaCEP falhou:',err);
    setCepStatus('Não foi possível buscar o CEP agora. Preencha o endereço manualmente.','warn');
  }
}
cepEl.addEventListener('input',()=>{
  let v=cepEl.value.replace(/\D/g,'').slice(0,8);          // só números, máximo 8
  cepEl.value=v.length>5?v.slice(0,5)+'-'+v.slice(5):v;     // máscara 00000-000
  cepEl.closest('.field')?.classList.remove('invalid');
  if(v.length<8){ lastCepQueried=''; resetFrete(); recalc(); }
  if(v.length===8){ lookupCep(v); }
});
cepEl.addEventListener('blur',()=>{
  const v=cepEl.value.replace(/\D/g,'');
  if(v.length===8){ lookupCep(v); }
});
autoFields.uf.addEventListener('input',()=>{ autoFields.uf.value=autoFields.uf.value.toUpperCase(); });
function resetCep(){ lastCepQueried=''; Object.keys(autoLast).forEach(k=>autoLast[k]=''); setCepStatus('',''); resetFrete(); }
/* ================================================================= */

function validate(){
  let ok=true;
  ['nome','telefone','endereco','numero'].forEach(n=>{
    const el=document.querySelector('[name="'+n+'"]');
    if(!el.value.trim()){ el.closest('.field').classList.add('invalid'); ok=false; }
  });
  const tel=document.querySelector('[name="telefone"]').value.replace(/\D/g,'');
  if(tel.length<10){ document.querySelector('[name="telefone"]').closest('.field').classList.add('invalid'); ok=false; }
  const cepDig=document.querySelector('[name="cep"]').value.replace(/\D/g,'');
  if(cepDig.length!==8){ document.querySelector('[name="cep"]').closest('.field').classList.add('invalid'); ok=false; }
  if(!document.querySelector('[name="caldo"]:checked')){ $('#err-caldo').style.display='block'; ok=false; }
  if(!document.querySelector('[name="pagamento"]:checked')){ $('#err-pgto').style.display='block'; ok=false; }
  return ok;
}
function focusFirstInvalid(){
  const nodes=document.querySelectorAll('.field.invalid, #err-caldo, #err-pgto');
  let target=null;
  for(const el of nodes){
    if(el.classList.contains('field')){ target=el; break; }
    if(el.style.display==='block'){ target=el; break; }
  }
  if(!target) return;
  if(typeof target.scrollIntoView==='function') target.scrollIntoView({behavior:'smooth',block:'center'});
  const f=target.querySelector('input,textarea,select');
  if(f&&typeof f.focus==='function') f.focus({preventScroll:true});
}
function nextPedidoId(){
  let n=parseInt(localStorage.getItem('cf_seq')||'0',10)+1;
  localStorage.setItem('cf_seq',n);
  return "#"+String(n).padStart(3,'0');
}
$('#form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if(!validate()){ focusFirstInvalid(); return; }
  const btn=$('#submitBtn'), txt=$('#btnText');
  btn.disabled=true; txt.innerHTML='<span class="spin"></span>';
  const resumo=resumoAtual();
  const data={
    horario:new Date().toLocaleString('pt-BR'),
    nome:document.querySelector('[name="nome"]').value.trim(),
    telefone:document.querySelector('[name="telefone"]').value.trim(),
    endereco:document.querySelector('[name="endereco"]').value.trim(),
    numero:document.querySelector('[name="numero"]').value.trim(),
    complemento:document.querySelector('[name="complemento"]').value.trim(),
    cep:document.querySelector('[name="cep"]').value.replace(/\D/g,''),
    bairro_cep:document.querySelector('[name="bairro_cep"]').value.trim(),
    cidade:document.querySelector('[name="cidade"]').value.trim(),
    uf:document.querySelector('[name="uf"]').value.trim().toUpperCase(),
    caldo:document.querySelector('[name="caldo"]:checked').value,
    qtde:qty,
    pagamento:document.querySelector('[name="pagamento"]:checked').value,
    obs:document.querySelector('[name="obs"]').value.trim(),
    km:resumo.km,
    subtotal:resumo.subTxt,
    frete:resumo.freteTxt+(resumo.info?' '+resumo.info:''),
    total:resumo.totalTxt,
    website:document.querySelector('[name="website"]').value
  };
  const pid=nextPedidoId(); data.pedido_id=pid;
  if(SHEETS_URL){
    try{
      await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(data)});
    }catch(err){ console.warn('Falha ao salvar:',err); }
  }
  const msg=
'*Caldo da Fanny — Novo pedido '+pid+'*\n'+
'————————————\n'+
'*Cliente:* '+data.nome+'\n'+
'*Telefone:* '+data.telefone+'\n'+
'*Endereço:* '+data.endereco+', '+data.numero+'\n'+
(data.complemento?'*Complemento:* '+data.complemento+'\n':'')+
(data.bairro_cep?'*Bairro:* '+data.bairro_cep+'\n':'')+
((data.cidade||data.uf)?'*Cidade/UF:* '+data.cidade+(data.uf?'/'+data.uf:'')+'\n':'')+
(data.cep?'*CEP:* '+data.cep.slice(0,5)+'-'+data.cep.slice(5)+'\n':'')+
'————————————\n'+
'*Pedido:* '+data.qtde+'x '+data.caldo+'\n'+
'*Pagamento:* '+data.pagamento+'\n'+
(data.obs?'*Obs.:* '+data.obs+'\n':'')+
'*Subtotal:* '+data.subtotal+'\n'+
'*Frete:* '+data.frete+'\n'+
'*Total:* '+data.total+'\n'+
'*Horário:* '+data.horario;
  const wa='https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg);
  $('#waLink').href=wa; $('#donePid').textContent=pid;
  $('#form').style.display='none'; $('#done').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});
$('#again').onclick=()=>{
  $('#form').reset();
  document.querySelectorAll('.sel').forEach(x=>x.classList.remove('sel'));
  qty=1; resetCep(); recalc();
  $('#done').style.display='none'; $('#form').style.display='block';
  $('#submitBtn').disabled=false; $('#btnText').textContent='PEÇA PELO WHATSAPP';
};
recalc();
</script>
</body>
</html>
