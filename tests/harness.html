<!DOCTYPE html>
<html lang="pt-BR">
<head><meta charset="UTF-8"><title>harness</title></head>
<body>
<!-- DOM mínimo, porém fiel aos seletores que o script usa. O <script> abaixo é
     um SNAPSHOT do inline de ../frontend/index.html (Bloco 1: CEP + ViaCEP).
     Se editar o index.html, atualize este bloco para manter os testes fiéis. -->

<div class="menu" id="menu">
  <label class="item"><input type="radio" name="caldo" value="Caldo Verde" data-price="24.90" required><span class="info"></span></label>
  <label class="item"><input type="radio" name="caldo" value="Caldo de Mandioca" data-price="24.90"><span class="info"></span></label>
  <label class="item"><input type="radio" name="caldo" value="Caldo Cremoso de Frango" data-price="24.90"><span class="info"></span></label>
</div>
<div class="err" id="err-caldo">Escolha um caldo.</div>

<div class="qty"><button type="button" id="minus">-</button><span id="qtyVal">1</span><button type="button" id="plus">+</button></div>
<span class="val" id="total">R$ 24,90</span>

<form id="form" class="card" novalidate>
  <div class="field"><label>Nome</label><input type="text" name="nome"><div class="err">Informe seu nome.</div></div>
  <div class="field"><label>Telefone</label><input type="tel" name="telefone"><div class="err">Informe um telefone válido.</div></div>

  <div class="field">
    <label>CEP</label>
    <input type="text" name="cep" inputmode="numeric" maxlength="9" placeholder="00000-000" required>
    <div class="err">Informe um CEP válido (8 dígitos).</div>
    <div class="cep-status muted" id="cepStatus"></div>
  </div>

  <div class="field"><label>Endereço completo</label><textarea name="endereco"></textarea><div class="err">Informe o endereço.</div></div>
  <div class="field"><label>Bairro</label><input type="text" name="bairro_cep"></div>
  <div class="row2">
    <div class="field"><label>Cidade</label><input type="text" name="cidade"></div>
    <div class="field uf"><label>UF</label><input type="text" name="uf" maxlength="2"></div>
  </div>

  <div class="field">
    <div class="pill-group" id="bairros">
      <label class="pill"><input type="radio" name="bairro" value="Parque Imperial" required>Parque Imperial</label>
      <label class="pill"><input type="radio" name="bairro" value="Região">Região</label>
      <label class="pill"><input type="radio" name="bairro" value="Outro">Outro</label>
    </div>
    <div class="err" id="err-bairro">Escolha a área de entrega.</div>
  </div>

  <div class="field">
    <div class="pill-group" id="pgto">
      <label class="pill"><input type="radio" name="pagamento" value="PIX" required>PIX</label>
      <label class="pill"><input type="radio" name="pagamento" value="Dinheiro">Dinheiro</label>
      <label class="pill"><input type="radio" name="pagamento" value="Cartão">Cartão</label>
    </div>
    <div class="err" id="err-pgto">Escolha a forma de pagamento.</div>
  </div>

  <div class="field"><label>Observações</label><textarea name="obs"></textarea></div>

  <button type="submit" class="send" id="submitBtn"><span id="btnText">PEÇA PELO WHATSAPP</span></button>
</form>

<div class="card done" id="done" style="display:none">
  <div class="pid" id="donePid">#001</div>
  <a class="wa-btn" id="waLink" href="#" target="_blank" rel="noopener">Confirmar no WhatsApp</a>
  <button class="again" id="again">Fazer outro pedido</button>
</div>

<script>
/* ===================== CONFIGURAÇÃO ===================== */
const WHATSAPP = "5511973457136";
const SHEETS_URL = ""; // cole aqui a URL .../exec do Apps Script
/* ======================================================= */

const PRICE = 24.90;
let qty = 1;
const $ = s => document.querySelector(s);
const fmt = n => "R$ " + n.toFixed(2).replace(".", ",");

document.querySelectorAll('#menu .item').forEach(it=>{
  it.addEventListener('click',()=>{
    document.querySelectorAll('#menu .item').forEach(x=>x.classList.remove('sel'));
    it.classList.add('sel'); $('#err-caldo').style.display='none';
  });
});
['#bairros','#pgto'].forEach(g=>{
  document.querySelectorAll(g+' .pill').forEach(p=>{
    p.addEventListener('click',()=>{
      document.querySelectorAll(g+' .pill').forEach(x=>x.classList.remove('sel'));
      p.classList.add('sel');
    });
  });
});
function updateTotal(){ $('#qtyVal').textContent=qty; $('#total').textContent=fmt(PRICE*qty); }
$('#plus').onclick=()=>{ if(qty<20){qty++;updateTotal();} };
$('#minus').onclick=()=>{ if(qty>1){qty--;updateTotal();} };
document.querySelectorAll('#form input,#form textarea').forEach(el=>{
  el.addEventListener('input',()=>el.closest('.field')?.classList.remove('invalid'));
});

/* ===================== CEP + ViaCEP (Bloco 1) ===================== */
const cepEl=document.querySelector('[name="cep"]');
const cepStatus=document.getElementById('cepStatus');
const autoFields={
  endereco:document.querySelector('[name="endereco"]'),
  bairro_cep:document.querySelector('[name="bairro_cep"]'),
  cidade:document.querySelector('[name="cidade"]'),
  uf:document.querySelector('[name="uf"]')
};
const autoLast={endereco:'',bairro_cep:'',cidade:'',uf:''};
let lastCepQueried='';
function setCepStatus(msg,cls){ cepStatus.textContent=msg||''; cepStatus.className='cep-status '+(cls||'muted'); }
// Só preenche se o campo estiver vazio ou ainda com o valor que o próprio ViaCEP pôs
// (assim nunca sobrescreve o que o cliente digitou manualmente).
function setAuto(key,val){
  if(!val) return;
  const el=autoFields[key]; if(!el) return;
  if(el.value.trim()===''||el.value===autoLast[key]){
    el.value=val; autoLast[key]=val;
    el.closest('.field')?.classList.remove('invalid');
  }
}
async function lookupCep(cep){
  if(cep===lastCepQueried) return;       // evita buscas repetidas do mesmo CEP
  lastCepQueried=cep;
  setCepStatus('Buscando endereço…','muted');
  try{
    const r=await fetch('https://viacep.com.br/ws/'+cep+'/json/');
    if(!r.ok) throw new Error('HTTP '+r.status);
    const d=await r.json();
    if(d.erro){ setCepStatus('CEP não encontrado. Você pode preencher o endereço manualmente.','warn'); return; }
    setAuto('endereco',d.logradouro);
    setAuto('bairro_cep',d.bairro);
    setAuto('cidade',d.localidade);
    setAuto('uf',d.uf);
    setCepStatus('Endereço preenchido pelo CEP ✓ — confira e complete o número.','ok');
  }catch(err){
    // Falha do ViaCEP (rede/indisponível) NÃO bloqueia o pedido.
    console.warn('ViaCEP falhou:',err);
    setCepStatus('Não foi possível buscar o CEP agora. Preencha o endereço manualmente.','warn');
  }
}
cepEl.addEventListener('input',()=>{
  let v=cepEl.value.replace(/\D/g,'').slice(0,8);          // só números, máximo 8
  cepEl.value=v.length>5?v.slice(0,5)+'-'+v.slice(5):v;     // máscara 00000-000
  cepEl.closest('.field')?.classList.remove('invalid');
  if(v.length<8){ lastCepQueried=''; }
  if(v.length===8) lookupCep(v);
});
cepEl.addEventListener('blur',()=>{
  const v=cepEl.value.replace(/\D/g,'');
  if(v.length===8) lookupCep(v);
});
autoFields.uf.addEventListener('input',()=>{ autoFields.uf.value=autoFields.uf.value.toUpperCase(); });
function resetCep(){ lastCepQueried=''; Object.keys(autoLast).forEach(k=>autoLast[k]=''); setCepStatus('',''); }
/* ================================================================= */

function validate(){
  let ok=true;
  ['nome','telefone','endereco'].forEach(n=>{
    const el=document.querySelector('[name="'+n+'"]');
    if(!el.value.trim()){ el.closest('.field').classList.add('invalid'); ok=false; }
  });
  const tel=document.querySelector('[name="telefone"]').value.replace(/\D/g,'');
  if(tel.length<10){ document.querySelector('[name="telefone"]').closest('.field').classList.add('invalid'); ok=false; }
  const cepDig=document.querySelector('[name="cep"]').value.replace(/\D/g,'');
  if(cepDig.length!==8){ document.querySelector('[name="cep"]').closest('.field').classList.add('invalid'); ok=false; }
  if(!document.querySelector('[name="caldo"]:checked')){ $('#err-caldo').style.display='block'; ok=false; }
  if(!document.querySelector('[name="bairro"]:checked')){ $('#err-bairro').style.display='block'; ok=false; }
  if(!document.querySelector('[name="pagamento"]:checked')){ $('#err-pgto').style.display='block'; ok=false; }
  return ok;
}
function nextPedidoId(){
  let n=parseInt(localStorage.getItem('cf_seq')||'0',10)+1;
  localStorage.setItem('cf_seq',n);
  return "#"+String(n).padStart(3,'0');
}
$('#form').addEventListener('submit', async (e)=>{
  e.preventDefault();
  if(!validate()) return;
  const btn=$('#submitBtn'), txt=$('#btnText');
  btn.disabled=true; txt.innerHTML='<span class="spin"></span>';
  const data={
    horario:new Date().toLocaleString('pt-BR'),
    nome:document.querySelector('[name="nome"]').value.trim(),
    telefone:document.querySelector('[name="telefone"]').value.trim(),
    endereco:document.querySelector('[name="endereco"]').value.trim(),
    cep:document.querySelector('[name="cep"]').value.replace(/\D/g,''),
    bairro_cep:document.querySelector('[name="bairro_cep"]').value.trim(),
    cidade:document.querySelector('[name="cidade"]').value.trim(),
    uf:document.querySelector('[name="uf"]').value.trim().toUpperCase(),
    bairro:document.querySelector('[name="bairro"]:checked').value,
    caldo:document.querySelector('[name="caldo"]:checked').value,
    qtde:qty,
    pagamento:document.querySelector('[name="pagamento"]:checked').value,
    obs:document.querySelector('[name="obs"]').value.trim(),
    total:fmt(PRICE*qty)
  };
  const pid=nextPedidoId(); data.pedido_id=pid;
  if(SHEETS_URL){
    try{
      await fetch(SHEETS_URL,{method:'POST',mode:'no-cors',
        headers:{'Content-Type':'text/plain;charset=utf-8'},
        body:JSON.stringify(data)});
    }catch(err){ console.warn('Falha ao salvar:',err); }
  }
  const msg=
'*Caldo da Fanny — Novo pedido '+pid+'*\n'+
'————————————\n'+
'*Cliente:* '+data.nome+'\n'+
'*Telefone:* '+data.telefone+'\n'+
'*Endereço:* '+data.endereco+'\n'+
(data.bairro_cep?'*Bairro:* '+data.bairro_cep+'\n':'')+
((data.cidade||data.uf)?'*Cidade/UF:* '+data.cidade+(data.uf?'/'+data.uf:'')+'\n':'')+
(data.cep?'*CEP:* '+data.cep.slice(0,5)+'-'+data.cep.slice(5)+'\n':'')+
'*Área de entrega:* '+data.bairro+'\n'+
'————————————\n'+
'*Pedido:* '+data.qtde+'x '+data.caldo+'\n'+
'*Pagamento:* '+data.pagamento+'\n'+
(data.obs?'*Obs.:* '+data.obs+'\n':'')+
'*Total:* '+data.total+'\n'+
'*Horário:* '+data.horario;
  const wa='https://wa.me/'+WHATSAPP+'?text='+encodeURIComponent(msg);
  $('#waLink').href=wa; $('#donePid').textContent=pid;
  $('#form').style.display='none'; $('#done').style.display='block';
  window.scrollTo({top:0,behavior:'smooth'});
});
$('#again').onclick=()=>{
  $('#form').reset();
  document.querySelectorAll('.sel').forEach(x=>x.classList.remove('sel'));
  qty=1; updateTotal(); resetCep();
  $('#done').style.display='none'; $('#form').style.display='block';
  $('#submitBtn').disabled=false; $('#btnText').textContent='PEÇA PELO WHATSAPP';
};
updateTotal();
</script>
</body>
</html>
